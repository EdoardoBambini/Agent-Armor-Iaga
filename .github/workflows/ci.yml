name: CI

on:
  push:
    branches: [main, master, "feat/1.0-**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Security audit
        run: cargo audit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests (default features)
        run: cargo test --workspace

      - name: Run armor-reasoning tests with `ml` feature (tract-onnx)
        run: cargo test -p armor-reasoning --features ml

      - name: Validate example plugin path
        run: cargo test -p agent-armor-core --features plugins --test plugin_example_tests

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Compile Python SDK
        working-directory: sdks/python
        run: python -m compileall agent_armor

      - name: Build UI (for ui-embed)
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Verify ui-embed feature compiles
        run: cargo build -p agent-armor-core --features ui-embed

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Smoke-test CLI surface (1.0)
        run: |
          ./target/release/armor --help
          ./target/release/armor kernel status
          ./target/release/armor reasoning info
          ./target/release/armor policy lint crates/armor-apl/examples/no_pii_egress.apl
          ./target/release/armor policy test crates/armor-apl/examples/no_pii_egress.apl --context crates/armor-apl/examples/sample_context.json

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-armor-binary
          path: target/release/agent-armor

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-armor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-armor
          generate_release_notes: true
