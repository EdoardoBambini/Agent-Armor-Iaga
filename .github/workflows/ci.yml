name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            community/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('community/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        working-directory: community
        run: cargo fmt --check

      - name: Run clippy
        working-directory: community
        run: cargo clippy -- -D warnings

      - name: Security audit
        working-directory: community
        run: cargo audit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            community/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('community/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        working-directory: community
        run: cargo test --all-features

      - name: Validate example plugin path
        working-directory: community
        run: cargo test --features plugins --test plugin_example_tests

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Compile Python SDK
        working-directory: sdks/python
        run: python -m compileall agent_armor

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            community/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('community/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binary
        working-directory: community
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-armor-binary
          path: community/target/release/agent-armor

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-armor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-armor
          generate_release_notes: true
